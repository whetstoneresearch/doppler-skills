name: Version and Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (ignored if version is provided)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Exact version to release (e.g. 1.2.3 or v1.2.3)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          EXACT_VERSION="${{ inputs.version }}"
          BUMP="${{ inputs.bump }}"

          if [[ -n "${EXACT_VERSION}" ]]; then
            NEXT_VERSION="${EXACT_VERSION#v}"
          else
            LATEST_TAG="$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)"

            if [[ -z "${LATEST_TAG}" ]]; then
              MAJOR=0
              MINOR=0
              PATCH=0
            else
              CURRENT_VERSION="${LATEST_TAG#v}"
              if [[ ! "${CURRENT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "Latest tag '${LATEST_TAG}' is not semver (vX.Y.Z)." >&2
                exit 1
              fi
              IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT_VERSION}"
            fi

            case "${BUMP}" in
              patch)
                PATCH=$((PATCH + 1))
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              *)
                echo "Unknown bump type: ${BUMP}" >&2
                exit 1
                ;;
            esac

            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          if [[ ! "${NEXT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match X.Y.Z. Got: ${NEXT_VERSION}" >&2
            exit 1
          fi

          TAG="v${NEXT_VERSION}"
          if git rev-parse --verify --quiet "${TAG}" >/dev/null; then
            echo "Tag already exists: ${TAG}" >&2
            exit 1
          fi

          echo "version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release (no npm publish)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.resolve.outputs.tag }}" \
            --target "${{ github.ref_name }}" \
            --title "${{ steps.resolve.outputs.tag }}" \
            --generate-notes
